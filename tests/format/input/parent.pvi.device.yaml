# yaml-language-server: $schema=../../../schemas/pvi.device.schema.json

label: Parent
children:
  - type: Group
    name: ParentGroup
    layout:
      type: Grid
    children:
      - type: SignalR
        name: ParentGroupSignal
        read_pv: ParentGroupParent_RBV
      - type: SignalR
        name: ParentGroupSignalToIgnore
        read_pv: ParentGroupSignalToIgnore_RBV
  - type: Include
    file_name: grandparent
  - type: Group
    name: GrandParentGroup
    layout:
      type: Grid
    children:
      - type: SignalR
        name: GrandParentBottomSignal
        read_pv: GrandParentBottomSignal
